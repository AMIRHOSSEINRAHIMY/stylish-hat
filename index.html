<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stylish | فروشگاه کلاه</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:Tahoma, sans-serif; }
  body { background:#eaf4fb; color:#1a3a4a; overflow-x:hidden; }

  /* ---------- صفحه ورودی 3D ---------- */
  #hero {
    height:100vh; display:flex; flex-direction:column; justify-content:center;
    align-items:center; text-align:center;
    background:linear-gradient(135deg,#ffffff 0%,#d6ecfa 100%);
    perspective:800px;
  }
  #hero h1 {
    font-size:5rem; color:#2b7cb3; letter-spacing:4px;
    text-shadow:2px 2px 0 #b3d9f2, 4px 4px 8px rgba(43,124,179,.4);
    transform:rotateX(15deg); animation:float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform:rotateX(15deg) translateY(0); }
    50% { transform:rotateX(15deg) translateY(-20px); }
  }
  #hero p { margin-top:20px; font-size:1.3rem; color:#5a8fb0; }
  .btn {
    margin-top:35px; padding:14px 40px; border:none; border-radius:30px;
    background:#2b7cb3; color:#fff; font-size:1.1rem; cursor:pointer;
    box-shadow:0 8px 20px rgba(43,124,179,.35); transition:.3s;
  }
  .btn:hover { transform:translateY(-4px); background:#236492; }

  /* ---------- بخش محصولات ---------- */
  section { padding:60px 20px; }
  h2 { text-align:center; color:#2b7cb3; margin-bottom:40px; font-size:2rem; }
  .grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
    gap:25px; max-width:1100px; margin:auto;
  }
  .card {
    background:#fff; border-radius:16px; overflow:hidden; text-align:center;
    box-shadow:0 6px 18px rgba(43,124,179,.15); transition:.3s;
  }
  .card:hover { transform:translateY(-8px); box-shadow:0 12px 28px rgba(43,124,179,.25); }
  .card img { width:100%; height:200px; object-fit:cover; }
  .card .info { padding:16px; }
  .card h3 { color:#1a3a4a; margin-bottom:8px; }
  .card .price { color:#2b7cb3; font-weight:bold; font-size:1.1rem; }
  .card p { color:#6b8ba0; font-size:.9rem; margin-top:6px; }

  /* ---------- پنل مدیریت ---------- */
  #adminPanel { display:none; background:#f5fafe; }
  .form-box {
    max-width:500px; margin:auto; background:#fff; padding:30px;
    border-radius:16px; box-shadow:0 6px 18px rgba(43,124,179,.15);
  }
  .form-box input, .form-box textarea {
    width:100%; padding:12px; margin:8px 0; border:1px solid #cfe4f5;
    border-radius:10px; font-size:1rem;
  }
  .admin-item {
    display:flex; justify-content:space-between; align-items:center;
    background:#fff; padding:12px 18px; border-radius:12px; margin:10px auto;
    max-width:600px; box-shadow:0 4px 12px rgba(43,124,179,.1);
  }
  .del { background:#e07b7b; padding:6px 16px; border:none; border-radius:8px;
    color:#fff; cursor:pointer; }
  .nav { text-align:center; padding:15px; background:#fff;
    box-shadow:0 2px 8px rgba(0,0,0,.05); position:sticky; top:0; z-index:10; }
  .nav a { margin:0 15px; color:#2b7cb3; text-decoration:none; font-weight:bold; cursor:pointer; }
</style>
</head>
<body>

  <!-- نوار پیمایش -->
  <div class="nav">
    <a onclick="showPublic()">صفحه عمومی</a>
    <a onclick="login()">ورود مدیر</a>
  </div>

  <!-- ============ لینک عمومی ============ -->
  <div id="publicView">
    <div id="hero">
      <h1>Stylish</h1>
      <p>فروشگاه تخصصی کلاه — شیک، مدرن، متفاوت</p>
      <button class="btn" onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})">
        مشاهده محصولات
      </button>
    </div>
    <section id="products">
      <h2>محصولات ما</h2>
      <div class="grid" id="publicGrid"></div>
    </section>
  </div>

  <!-- ============ لینک مدیریت ============ -->
  <div id="adminPanel">
    <section>
      <h2>پنل مدیریت Stylish</h2>
      <div class="form-box">
        <input type="text" id="pName" placeholder="نام محصول">
        <input type="text" id="pPrice" placeholder="قیمت (تومان)">
        <input type="text" id="pImg" placeholder="لینک عکس محصول">
        <textarea id="pDesc" placeholder="مشخصات محصول"></textarea>
        <button class="btn" onclick="addProduct()">افزودن محصول</button>
      </div>
      <h2 style="margin-top:40px;">لیست محصولات</h2>
      <div id="adminList"></div>
    </section>
  </div>

<script>
  // ذخیره‌سازی محصولات در مرورگر
  let products = JSON.parse(localStorage.getItem("stylishProducts")) || [
    {name:"کلاه کلاسیک", price:"۳۵۰,۰۰۰", img:"https://images.unsplash.com/photo-1521369909029-2afed882baee?w=400", desc:"کلاه پارچه‌ای شیک برای استفاده روزمره"},
    {name:"کلاه زمستانی", price:"۲۸۰,۰۰۰", img:"https://images.unsplash.com/photo-1576871337622-98d48d1cf531?w=400", desc:"بافت گرم و نرم مناسب فصل سرد"}
  ];

  function save() { localStorage.setItem("stylishProducts", JSON.stringify(products)); }

  function renderPublic() {
    let g = document.getElementById("publicGrid");
    g.innerHTML = "";
    products.forEach(p => {
      g.innerHTML += `<div class="card">
        <img src="${p.img}" alt="${p.name}">
        <div class="info">
          <h3>${p.name}</h3>
          <div class="price">${p.price} تومان</div>
          <p>${p.desc}</p>
        </div></div>`;
    });
  }

  function renderAdmin() {
    let l = document.getElementById("adminList");
    l.innerHTML = "";
    products.forEach((p, i) => {
      l.innerHTML += `<div class="admin-item">
        <span>${p.name} — ${p.price} تومان</span>
        <button class="del" onclick="delProduct(${i})">حذف</button>
      </div>`;
    });
  }

  function addProduct() {
    let name = pName.value, price = pPrice.value, img = pImg.value, desc = pDesc.value;
    if(!name || !price) { alert("نام و قیمت را وارد کنید"); return; }
    products.push({name, price, img: img || "https://via.placeholder.com/400x200?text=Stylish", desc});
    save(); renderAdmin(); renderPublic();
    pName.value=pPrice.value=pImg.value=pDesc.value="";
  }

  function delProduct(i) { products.splice(i,1); save(); renderAdmin(); renderPublic(); }

  function login() {
    let pass = prompt("رمز مدیریت را وارد کنید:");
    if(pass === "stylish123") {   // 🔑 رمز عبور را اینجا تغییر دهید
      publicView.style.display="none";
      adminPanel.style.display="block";
      renderAdmin();
    } else if(pass !== null) { alert("رمز اشتباه است"); }
  }

  function showPublic() {
    adminPanel.style.display="none";
    publicView.style.display="block";
    renderPublic();
  }

  renderPublic();
</script>
</body>
</html>
